version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: medfex_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: medfex_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/medfex
      - JWT_SECRET=medfex_secret_key_123
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads

  client:
    build: 
      context: ./client
      dockerfile: Dockerfile
    container_name: medfex_client
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
